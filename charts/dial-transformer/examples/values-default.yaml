# Example values using default configuration.
# Overrides the INTERSECT broker and hierarchy settings.

dialTransformer:
  configFile: |
    {
      "intersect": {
        "brokers": [
          {
            "username": "intersect_username",
            "password": "intersect_password",
            "host": "broker",
            "port": 5672,
            "protocol": "amqp0.9.1"
          }
        ]
      },
      "intersect-hierarchy": {
        "organization": "ornl",
        "facility": "intersect",
        "system": "dial-transformer-system",
        "subsystem": "dial-transformer-subsystem",
        "service": "dial-transformer-service"
      }
    }
